interface:
  display_name: "Safe Commit Preview"
  short_description: "Plan commits around meaningful work chunks and preview them before committing"
  icon_small: "./assets/icon-small.png"
  icon_large: "./assets/icon-large.png"
  brand_color: "#0F766E"
  default_prompt: "Use $safe-commit-preview to split my local changes into commits based on meaningful work chunks, show me a preview first, and commit only after I approve."

policy:
  allow_implicit_invocation: true
