interface:
  display_name: "Staged Commit Message"
  short_description: "Draft body-first and no-body commit messages from staged changes"
  icon_small: "./assets/icon-small.svg"
  icon_large: "./assets/icon-large.svg"
  brand_color: "#15803D"
  default_prompt: "Use $commit-message-staged-check to draft a subject-plus-body commit message first, then a subject-only alternative from the current staged changes."

policy:
  allow_implicit_invocation: true
